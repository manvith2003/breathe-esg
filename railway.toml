# BreatheESG — Railway deployment config for backend

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "python manage.py migrate && python manage.py loaddata emission_factors && python manage.py seed_demo_data && gunicorn breathe.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "breatheesg-api"

[services.variables]
DEBUG = "False"
ALLOWED_HOSTS = "${{RAILWAY_PUBLIC_DOMAIN}}"
CORS_ALLOW_ALL_ORIGINS = "False"
